<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HRDesk</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    background: #f7f8fa;
    color: #1a1a1a;
    display: flex;
    justify-content: center;
    min-height: 100vh;
    line-height: 1.5;
  }

  .app {
    max-width: 720px;
    width: 100%;
    display: flex;
    flex-direction: column;
    padding: 24px;
  }

  header {
    padding-bottom: 16px;
    border-bottom: 1px solid #e5e7eb;
    margin-bottom: 16px;
  }

  header h1 { font-size: 20px; font-weight: 600; }
  header p { color: #6b7280; font-size: 14px; margin-top: 4px; }

  .examples {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 16px;
  }

  .example-btn {
    background: white;
    border: 1px solid #d1d5db;
    border-radius: 999px;
    padding: 6px 12px;
    font-size: 13px;
    cursor: pointer;
    color: #374151;
    font-family: inherit;
  }
  .example-btn:hover { background: #f3f4f6; }

  #messages {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 8px 0;
    min-height: 200px;
  }

  .msg {
    max-width: 85%;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 15px;
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  .msg.user {
    align-self: flex-end;
    background: #4f46e5;
    color: white;
    border-bottom-right-radius: 4px;
  }

  .msg.assistant {
    align-self: flex-start;
    background: white;
    border: 1px solid #e5e7eb;
    border-bottom-left-radius: 4px;
  }

  .msg.error {
    align-self: flex-start;
    background: #fef2f2;
    border: 1px solid #fecaca;
    color: #991b1b;
  }

  .typing {
    align-self: flex-start;
    color: #9ca3af;
    padding: 10px 14px;
    font-style: italic;
    font-size: 14px;
  }

  form {
    display: flex;
    gap: 8px;
    padding-top: 16px;
    border-top: 1px solid #e5e7eb;
    margin-top: 16px;
    position: sticky;
    bottom: 0;
    background: #f7f8fa;
  }

  input[type="text"] {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    font-size: 15px;
    font-family: inherit;
  }
  input[type="text"]:focus {
    outline: none;
    border-color: #4f46e5;
  }

  button[type="submit"] {
    padding: 10px 20px;
    background: #4f46e5;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 500;
  }
  button[type="submit"]:hover:not(:disabled) { background: #4338ca; }
  button[type="submit"]:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>
  <div class="app">
    <header>
      <h1>HRDesk</h1>
      <p>Ask about company policies or your personal HR data.</p>
    </header>

    <div class="examples">
      <button class="example-btn" data-q="What is the dress code?">Dress code</button>
      <button class="example-btn" data-q="How many vacation days do I have left?">Vacation balance</button>
      <button class="example-btn" data-q="How do I reset my password?">Password reset</button>
      <button class="example-btn" data-q="How much maternity leave do I get?">Maternity leave</button>
    </div>

    <div id="messages"></div>

    <form id="input-form">
      <input type="text" id="question" placeholder="Type your question..." autocomplete="off" required />
      <button type="submit" id="send-btn">Send</button>
    </form>
  </div>

  <script>
    const messagesEl = document.getElementById("messages");
    const form = document.getElementById("input-form");
    const input = document.getElementById("question");
    const sendBtn = document.getElementById("send-btn");

    function addMessage(role, text) {
      const div = document.createElement("div");
      div.className = `msg ${role}`;
      div.textContent = text;
      messagesEl.appendChild(div);
      div.scrollIntoView({ behavior: "smooth", block: "end" });
      return div;
    }

    function addTyping() {
      const div = document.createElement("div");
      div.className = "typing";
      div.textContent = "HRDesk is thinking...";
      messagesEl.appendChild(div);
      div.scrollIntoView({ behavior: "smooth", block: "end" });
      return div;
    }

    async function ask(question) {
      if (!question.trim()) return;

      addMessage("user", question);
      input.value = "";
      sendBtn.disabled = true;
      const typingEl = addTyping();

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question }),
        });
        typingEl.remove();
        if (!res.ok) {
          addMessage("error", `Error ${res.status}: ${res.statusText}`);
          return;
        }
        const data = await res.json();
        addMessage("assistant", data.answer);
      } catch (err) {
        typingEl.remove();
        addMessage("error", "Network error: " + err.message);
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    }

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      ask(input.value);
    });

    document.querySelectorAll(".example-btn").forEach((btn) => {
      btn.addEventListener("click", () => ask(btn.dataset.q));
    });

    input.focus();
  </script>
</body>
</html>
